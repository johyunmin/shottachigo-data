name: Update KRX data

on:
  schedule:
    # 매일 KST 03:30 = UTC 18:30
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Fetch KRX data
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: npm run fetch

      - name: Fetch US data (no auth)
        run: npm run fetch:us

      - name: Commit if changed
        run: |
          git config user.name 'data-bot'
          git config user.email 'data-bot@users.noreply.github.com'
          git add data/krx-stocks.json data/us-stocks.json
          if git diff --cached --quiet; then
            echo "변경 없음 — skip"
          else
            git commit -m "chore: refresh data ($(date -u +%Y-%m-%d))"
            git push
          fi
